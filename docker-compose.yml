services:
  # Local development - builds from Dockerfile (stdio transport)
  br-community-local:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: br-community-mcp-server-local
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Remote HTTP server - exposes MCP over streamable-http
  br-community-http:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: br-community-mcp-server-http
    restart: unless-stopped
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
    ports:
      - "8000:8000"
